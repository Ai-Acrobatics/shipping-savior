      - id: mob-shipments
        feature: Shipments list/detail parity with web
        method: simulator
        pass: Same rows as web for the same org; pull-to-refresh picks up a web-created shipment; detail shows reefer/cutoff meta
        fail: Data divergence from web
        status: pass
        evidence: "2026-07-15: Shipments tab rendered LIVE prod data — MAEU7788990 Port Hueneme→Yokohama (the BOL scanned earlier this session) + MAEU3390771 Long Beach→Shanghai; status filter chips + In-Transit/Pending badges; native 5-tab shell (Shipments/Scan/Assistant/Calculate/Account)."
      - id: mob-scan-save
        feature: Camera scan → save (field workflow)
        method: simulator
        pass: See bol_scan_to_shipment.mob-camera-scan
        status: blocked
        blocked_by: AI-12719
      - id: mob-assistant
        feature: Assistant tab
        method: simulator
        pass: Same answer quality as web chat (once AI-12777 fixed)
        status: blocked
        blocked_by: AI-12719, AI-12777
      - id: mob-calc
        feature: Landed-cost calc + save syncs to web history
        method: simulator
        pass: Mobile save appears in web /platform/history
        status: blocked
        blocked_by: AI-12719
      - id: mob-theme-logout
        feature: Theme switch + logout unregisters push token
        method: simulator
        pass: Theme persists; logout removes push_tokens row (verify via sql)
        status: blocked
        blocked_by: AI-12719

  # ────────────────────────────────────────────────────────────────
