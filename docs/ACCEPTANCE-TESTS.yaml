        status: blocked
        blocked_by: AI-12721
      - id: store-guideline-4-2
        feature: Native capability clears "minimum functionality"
        method: manual
        pass: Camera scan + push + native UI demonstrable in review notes
        status: blocked
        blocked_by: AI-12719
      - id: store-android
        feature: Play internal track live
        method: manual
        pass: AAB uploaded, data-safety form filed, installable via internal testing link
        status: blocked
